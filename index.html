      // --- Pan & Zoom for the SVG map ---
      (function setupPanZoom(){
          const svgEl = document.querySelector('.africa-map');
          const mapGroupEl = document.getElementById('mapGroup');
          if (!svgEl || !mapGroupEl) return;

          let scale = 1;
          const minScale = 0.7;
          const maxScale = 4;
          let tx = 0, ty = 0;

          function updateTransform(){
              mapGroupEl.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
          }

          // Zoom centered on mouse
          svgEl.addEventListener('wheel', (e) => {
              e.preventDefault();
              const rect = svgEl.getBoundingClientRect();
              const mx = e.clientX - rect.left;
              const my = e.clientY - rect.top;

              const delta = e.deltaY < 0 ? 1.12 : 0.9;
              const prev = scale;
              scale = Math.max(minScale, Math.min(maxScale, scale * delta));

              // adjust translation so the zoom focal point remains under the cursor
              const k = (scale / prev) - 1;
              tx -= k * mx;
              ty -= k * my;

              updateTransform();
          }, { passive: false });

          // Drag to pan (ignore drags that start on a country)
          let isPanning = false;
          let startX = 0, startY = 0;

          svgEl.addEventListener('mousedown', (e) => {
              if (e.target.closest && e.target.closest('.country')) return;
              isPanning = true;
              startX = e.clientX;
              startY = e.clientY;
              svgEl.style.cursor = 'grabbing';
          });

          window.addEventListener('mousemove', (e) => {
              if (!isPanning) return;
              tx += (e.clientX - startX);
              ty += (e.clientY - startY);
              startX = e.clientX;
              startY = e.clientY;
              updateTransform();
          });

          window.addEventListener('mouseup', () => {
              if (!isPanning) return;
              isPanning = false;
              svgEl.style.cursor = 'grab';
          });

          // Double click to reset
          svgEl.addEventListener('dblclick', () => {
              scale = 1; tx = 0; ty = 0; updateTransform();
          });
      })();

      const countries = document.querySelectorAll(".country");
      const tooltip = document.getElementById("tooltip");

      countries.forEach((country) => {
        country.addEventListener("mouseenter", (e) => {
          tooltip.textContent = country.getAttribute("data-name");
          tooltip.style.opacity = "1";
        });

        country.addEventListener("mousemove", (e) => {
          tooltip.style.left = e.clientX + window.scrollX + 12 + "px";
          tooltip.style.top = e.clientY + window.scrollY + 12 + "px";
        });

        country.addEventListener("mouseleave", () => {
          tooltip.style.opacity = "0";
        });

        country.addEventListener("click", () => selectCountry(country));
      });

      function updateLogoGrid(countryCode) {
        const grid = document.getElementById("logoGrid");
        grid.innerHTML = "";

        const logos = countryLogos[countryCode] || [];

        if (logos.length === 0) {
          grid.innerHTML = '<div style="color: #94a3b8; text-align: center; padding: 20px; font-size: 0.9em;">No companies listed for this country</div>';
          return;
        }

        logos.forEach((logoUrl) => {
          const slot = document.createElement("div");
          slot.className = "logo-slot";
          slot.innerHTML = `<img src="${logoUrl}" alt="Company Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\\'font-size:0.7em; color:#64748b; text-align:center; padding:5px;\\'>Logo</span>';">`;
          grid.appendChild(slot);
        });
      }

      function clearAll() {
        if (confirm("Clear all data?")) {
          countries.forEach((c) => c.classList.remove("active", "highlighted"));
          selectedCountry = null;
          document.getElementById("countryName").textContent = "Select a Country";
          document.getElementById("statsSection").style.display = "none";
          document.getElementById("logoGrid").innerHTML = "";
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          countries.forEach((c) => c.classList.remove("active"));
          selectedCountry = null;
          document.getElementById("countryName").textContent =
